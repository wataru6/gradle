name: Build custom Gradle macOS amd64

on:
  workflow_dispatch:
    inputs:
      native_platform_version:
        description: Version to publish from native-platform and consume from Gradle
        required: true
        default: 0.22-milestone-28-custom
      gradle_version_qualifier:
        description: Gradle version qualifier, producing 9.1.0-<qualifier>-<timestamp>
        required: true
        default: custom

jobs:
  build:
    name: Build custom Gradle distribution
    runs-on: macos-15-intel
    timeout-minutes: 180

    env:
      NATIVE_PLATFORM_VERSION: ${{ inputs.native_platform_version }}
      NATIVE_PLATFORM_REPO: ${{ github.workspace }}/native-platform/build/repo
      GRADLE_VERSION_QUALIFIER: ${{ inputs.gradle_version_qualifier }}

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Verify macOS amd64 runner
        run: |
          uname -a
          test "$(uname -s)" = "Darwin"
          test "$(uname -m)" = "x86_64"

      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-custom-gradle-${{ hashFiles('native-platform/gradle/wrapper/gradle-wrapper.properties', 'gradle/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-custom-gradle-

      - name: Set up Java 8 for native-platform
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Build custom native-platform
        run: bash ci/build-native-platform-macos-amd64.sh

      - name: Upload native-platform Maven repository
        uses: actions/upload-artifact@v4
        with:
          name: native-platform-macos-amd64-maven-repo
          path: native-platform/build/repo

      - name: Set up Java 17 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Gradle distribution
        run: bash ci/build-gradle-custom-macos-amd64.sh

      - name: Upload custom Gradle distribution
        uses: actions/upload-artifact@v4
        with:
          name: custom-gradle-macos-amd64-bin
          path: gradle/packaging/distributions-full/build/distributions/gradle-*-bin.zip
